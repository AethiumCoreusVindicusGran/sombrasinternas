<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sombrasinternas</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#imagem {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    opacity: 1;
    transition: opacity 2s ease-in-out;
}

.fade-out {
    opacity: 0;
}
</style>
</head>
<body>

<img id="imagem" src="1.png" alt="Imagem">

<script>
const imagens = [
    "1.png",
    "2.png",
    "3.png",
    "10.png",
    "3.png",

    "4.png",
    "5.png",
    "6.png",
    "2.png",
    "3.png",

    "7.png",
    "8.png",
    "2.png",
    "10.png",
    "9.png",
    "5.png",
    "3.png",

    "9.png",
    "11.png",
    "3.png",
    "3.png",
    "2.png",
    "3.png"
];

const img = document.getElementById("imagem");
let indice = 0;

function trocarImagem() {
    img.classList.add("fade-out");

    setTimeout(() => {
        indice = (indice + 1) % imagens.length;
        img.src = imagens[indice];
        img.classList.remove("fade-out");
    }, 1016);
}

setInterval(trocarImagem, 1616);
</script>

</body>
</html>
